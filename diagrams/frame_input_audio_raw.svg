<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.12)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="160" rx="14" fill="#F0F6FF"/>
  <rect x="2" y="2" width="516" height="156" rx="13" fill="#F0F6FF" stroke="#B3D4FC" stroke-width="1"/>

  <!-- Title -->
  <text x="260" y="26" text-anchor="middle" fill="#1a3a5c" font-size="13" font-weight="700">InputAudioRawFrame</text>
  <text x="260" y="40" text-anchor="middle" fill="#7a9ac0" font-size="9">Raw PCM audio chunks streamed from microphone</text>

  <!-- Full waveform bar (top, continuous) -->
  <rect x="30" y="50" width="460" height="32" rx="6" fill="white" stroke="#c0d8f0" stroke-width="1"/>
  <g stroke="#4a86c8" stroke-width="2" stroke-linecap="round" fill="none" transform="translate(42, 54)">
    <!-- "hi" segment -->
    <line x1="0" y1="12" x2="0" y2="12"/>
    <line x1="5" y1="8" x2="5" y2="16"/>
    <line x1="10" y1="4" x2="10" y2="20"/>
    <line x1="15" y1="2" x2="15" y2="22"/>
    <line x1="20" y1="6" x2="20" y2="18"/>
    <line x1="25" y1="10" x2="25" y2="14"/>
    <!-- gap -->
    <line x1="40" y1="12" x2="40" y2="12"/>
    <line x1="55" y1="12" x2="55" y2="12"/>
    <!-- silence -->
    <line x1="70" y1="11" x2="70" y2="13"/>
    <line x1="75" y1="11" x2="75" y2="13"/>
    <line x1="80" y1="11" x2="80" y2="13"/>
    <!-- "how" segment -->
    <line x1="110" y1="12" x2="110" y2="12"/>
    <line x1="115" y1="9" x2="115" y2="15"/>
    <line x1="120" y1="5" x2="120" y2="19"/>
    <line x1="125" y1="3" x2="125" y2="21"/>
    <line x1="130" y1="1" x2="130" y2="23"/>
    <line x1="135" y1="4" x2="135" y2="20"/>
    <line x1="140" y1="7" x2="140" y2="17"/>
    <line x1="145" y1="10" x2="145" y2="14"/>
    <!-- silence -->
    <line x1="165" y1="11" x2="165" y2="13"/>
    <line x1="170" y1="11" x2="170" y2="13"/>
    <line x1="175" y1="11" x2="175" y2="13"/>
    <line x1="195" y1="11" x2="195" y2="13"/>
    <line x1="200" y1="11" x2="200" y2="13"/>
    <!-- "are you" segment -->
    <line x1="225" y1="12" x2="225" y2="12"/>
    <line x1="230" y1="8" x2="230" y2="16"/>
    <line x1="235" y1="5" x2="235" y2="19"/>
    <line x1="240" y1="2" x2="240" y2="22"/>
    <line x1="245" y1="4" x2="245" y2="20"/>
    <line x1="250" y1="7" x2="250" y2="17"/>
    <line x1="255" y1="9" x2="255" y2="15"/>
    <line x1="265" y1="6" x2="265" y2="18"/>
    <line x1="270" y1="3" x2="270" y2="21"/>
    <line x1="275" y1="1" x2="275" y2="23"/>
    <line x1="280" y1="4" x2="280" y2="20"/>
    <line x1="285" y1="7" x2="285" y2="17"/>
    <line x1="290" y1="10" x2="290" y2="14"/>
    <!-- trailing silence -->
    <line x1="320" y1="11" x2="320" y2="13"/>
    <line x1="325" y1="11" x2="325" y2="13"/>
    <line x1="340" y1="11" x2="340" y2="13"/>
    <line x1="365" y1="11" x2="365" y2="13"/>
    <line x1="395" y1="11" x2="395" y2="13"/>
    <line x1="410" y1="11" x2="410" y2="13"/>
    <line x1="425" y1="11" x2="425" y2="13"/>
  </g>

  <!-- Dashed divider lines splitting into 3 frames -->
  <line x1="175" y1="50" x2="175" y2="82" stroke="#4a86c8" stroke-width="1.2" stroke-dasharray="3 2"/>
  <line x1="325" y1="50" x2="325" y2="82" stroke="#4a86c8" stroke-width="1.2" stroke-dasharray="3 2"/>

  <!-- Down arrows from each segment -->
  <line x1="100" y1="84" x2="100" y2="100" stroke="#4a86c8" stroke-width="1.5"/>
  <polygon points="95,97 100,106 105,97" fill="#4a86c8"/>
  <line x1="250" y1="84" x2="250" y2="100" stroke="#4a86c8" stroke-width="1.5"/>
  <polygon points="245,97 250,106 255,97" fill="#4a86c8"/>
  <line x1="400" y1="84" x2="400" y2="100" stroke="#4a86c8" stroke-width="1.5"/>
  <polygon points="395,97 400,106 405,97" fill="#4a86c8"/>

  <!-- Frame 1 -->
  <rect x="30" y="108" width="140" height="38" rx="7" fill="white" stroke="#4a86c8" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="100" y="124" text-anchor="middle" fill="#1a3a5c" font-size="10" font-weight="600">"hi"</text>
  <text x="100" y="139" text-anchor="middle" fill="#4a86c8" font-size="9" font-weight="500">Frame 1</text>

  <!-- Frame 2 -->
  <rect x="190" y="108" width="140" height="38" rx="7" fill="white" stroke="#4a86c8" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="260" y="124" text-anchor="middle" fill="#1a3a5c" font-size="10" font-weight="600">"how"</text>
  <text x="260" y="139" text-anchor="middle" fill="#4a86c8" font-size="9" font-weight="500">Frame 2</text>

  <!-- Frame 3 -->
  <rect x="350" y="108" width="140" height="38" rx="7" fill="white" stroke="#4a86c8" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="420" y="124" text-anchor="middle" fill="#1a3a5c" font-size="10" font-weight="600">"are you"</text>
  <text x="420" y="139" text-anchor="middle" fill="#4a86c8" font-size="9" font-weight="500">Frame 3</text>

  <!-- Right arrows between frames -->
  <line x1="172" y1="127" x2="188" y2="127" stroke="#4a86c8" stroke-width="1.2"/>
  <polygon points="185,123 192,127 185,131" fill="#4a86c8"/>
  <line x1="332" y1="127" x2="348" y2="127" stroke="#4a86c8" stroke-width="1.2"/>
  <polygon points="345,123 352,127 345,131" fill="#4a86c8"/>
</svg>
